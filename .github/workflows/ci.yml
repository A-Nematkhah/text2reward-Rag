name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: [3.10]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile all
        run: python -m compileall -q txt2reward tests train.py evaluate.py plot_training.py

      - name: Ruff format
        run: python -m ruff format --check txt2reward tests train.py evaluate.py plot_training.py reward_program.py scripts

      - name: Ruff lint
        run: python -m ruff check txt2reward tests train.py evaluate.py plot_training.py reward_program.py scripts

      - name: Mypy
        run: python -m mypy txt2reward

      - name: Run tests
        run: pytest tests/ -q
